<!DOCTYPE html>
<html>
<head>
  <title>TranspoBot Chat IA</title>
</head>
<body style="background:#0f172a;color:white;font-family:Arial">

<h2>Assistant IA TranspoBot</h2>

<div id="chat-messages"></div>

<input id="chat-input" placeholder="Pose ta question">
<button onclick="sendChat()">Envoyer</button>

<script>
const API = "https://transpobot-api-nq6r.onrender.com";

async function sendChat() {
  const input = document.getElementById("chat-input");
  const q = input.value.trim();
  if (!q) return;

  const chat = document.getElementById("chat-messages");

  chat.innerHTML += `<p><b>Toi:</b> ${q}</p>`;
  input.value = "";

  chat.innerHTML += `<p id="loading">Bot réfléchit...</p>`;

  try {
    const res = await fetch(API + "/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ question: q, history: [] })
    });

    const data = await res.json();

    document.getElementById("loading").remove();

    chat.innerHTML += `<p><b>Bot:</b> ${data.answer}</p>`;
  } catch (e) {
    document.getElementById("loading").remove();
    chat.innerHTML += `<p style="color:red">Erreur serveur</p>`;
  }
}
</script>

</body>
</html>
