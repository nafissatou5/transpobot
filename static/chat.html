<!DOCTYPE html>
<html>
<head>
  <title>TranspoBot Chat IA</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    #chat-messages {
      border: 1px solid #334155;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #444;
      padding: 5px;
    }

    th {
      background: #1e293b;
    }
  </style>
</head>

<body>

<h2>Assistant IA TranspoBot</h2>

<div id="chat-messages"></div>

<input id="chat-input" placeholder="Pose ta question">
<button onclick="sendChat()">Envoyer</button>

<script>
const API = "https://transpobot-api-nq6r.onrender.com";

function renderTable(data) {
  if (!data || data.length === 0) return "";

  let html = "<table>";

  html += "<tr>";
  Object.keys(data[0]).forEach(key => {
    html += `<th>${key}</th>`;
  });
  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => {
      html += `<td>${val}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const q = input.value.trim();
  if (!q) return;

  const chat = document.getElementById("chat-messages");

  chat.innerHTML += `<p><b>Toi:</b> ${q}</p>`;
  input.value = "";

  chat.innerHTML += `<p id="loading">Bot réfléchit...</p>`;

  try {
    const res = await fetch(API + "/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ question: q, history: [] })
    });

    const data = await res.json();

    document.getElementById("loading").remove();

    chat.innerHTML += `<p><b>Bot:</b> ${data.answer}</p>`;

    if (data.sql) {
      chat.innerHTML += `<p style="color:#38bdf8"><b>SQL:</b> ${data.sql}</p>`;
    }

    if (data.data && data.data.length > 0) {
      chat.innerHTML += `<div style="color:#22c55e">
        <b>Résultat:</b>
        ${renderTable(data.data)}
      </div>`;
    }

  } catch (e) {
    document.getElementById("loading").remove();
    chat.innerHTML += `<p style="color:red">Erreur serveur</p>`;
  }
}
</script>

</body>
</html>
